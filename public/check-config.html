<!DOCTYPE html>
<html>
<head>
  <title>Check Config</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    pre { background: #333; padding: 10px; overflow: auto; }
    .error { color: #f00; }
    .success { color: #0f0; }
    .warning { color: #ff0; }
  </style>
</head>
<body>
  <h1>飞书配置检查</h1>
  <div id="output"></div>
  <script>
    const configStr = localStorage.getItem('feishu-config');
    const output = document.getElementById('output');
    
    if (!configStr) {
      output.innerHTML = '<p class="error">❌ 未找到配置！请先保存配置。</p>';
    } else {
      try {
        const config = JSON.parse(configStr);
        let html = '<pre>' + JSON.stringify(config, null, 2) + '</pre>';
        
        html += '<h2>关键字段检查:</h2><ul>';
        
        if (config.newMode?.tableIds?.requirements1) {
          html += '<li class="success">✅ 需求表1: ' + config.newMode.tableIds.requirements1 + '</li>';
        } else {
          html += '<li class="error">❌ 需求表1: 未设置</li>';
        }
        
        if (config.newMode?.tableIds?.requirements2) {
          html += '<li class="success">✅ 需求表2: ' + config.newMode.tableIds.requirements2 + '</li>';
        } else {
          html += '<li class="error">❌ 需求表2: 未设置</li>';
        }
        
        html += '<li>加载模式: ' + (config.requirementsLoadMode || 'all') + '</li>';
        html += '</ul>';
        
        output.innerHTML = html;
      } catch (e) {
        output.innerHTML = '<p class="error">❌ 配置格式错误: ' + e.message + '</p>';
      }
    }
  </script>
</body>
</html>
